<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LicenseHub - Comparador de Mayoristas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="logo">
      <div class="logo-dot"></div>
      LicenseHub
    </div>
    <div class="nav-info" id="totalCount">Cargando datos...</div>
  </nav>

  <main class="container">
    <section class="search-section" aria-label="Busqueda de licencias">
      <div class="search-title">Buscar licencias</div>

      <div class="search-row">
        <div class="search-field search-field-wide">
          <label for="searchInput">Nombre del producto</label>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Ej: Microsoft 365, Office, Teams..."
          >
        </div>

        <div class="search-field">
          <label for="typeFilter">Tipo</label>
          <select id="typeFilter" class="search-input">
            <option value="">Todos los tipos</option>
            <option value="NCE">NCE</option>
            <option value="SUSCRIPCION">Suscripcion</option>
            <option value="PERPETUO">Perpetuo</option>
          </select>
        </div>

        <div class="search-field">
          <label for="segFilter">Segmento</label>
          <select id="segFilter" class="search-input">
            <option value="">Todos</option>
            <option value="Commercial">Commercial</option>
            <option value="Education">Education</option>
            <option value="Charity">Charity</option>
          </select>
        </div>

        <div class="search-field">
          <label for="termFilter">Periodo</label>
          <select id="termFilter" class="search-input">
            <option value="">Todos</option>
            <option value="mensual">Mensual</option>
            <option value="anual">Anual</option>
            <option value="trianual">Trianual</option>
            <option value="onetime">One Time / Perpetuo</option>
          </select>
        </div>

        <button type="button" class="search-btn" id="searchButton">Buscar</button>
      </div>

      <div class="filters-row" aria-label="Mayoristas activos">
        <button type="button" class="filter-chip active" data-dist="LOL">
          <span class="chip-dot chip-dot-lol"></span>
          LOL
        </button>
        <button type="button" class="filter-chip active" data-dist="INTCOMEX">
          <span class="chip-dot chip-dot-intcomex"></span>
          INTCOMEX
        </button>
        <button type="button" class="filter-chip active" data-dist="INGRAM">
          <span class="chip-dot chip-dot-ingram"></span>
          INGRAM
        </button>
      </div>
    </section>

    <section class="profit-bar" aria-label="Configuracion de cotizacion">
      <div class="profit-label">Configurar cotizacion</div>

      <div class="profit-input-group">
        <label for="profitPct" class="inline-label">Rentabilidad %</label>
        <input type="number" id="profitPct" class="profit-input" value="20" min="0" max="999">
        <span class="inline-help">%</span>
      </div>

      <div class="profit-input-group">
        <label for="qtyInput" class="inline-label">Cantidad</label>
        <input type="number" id="qtyInput" class="qty-input" value="1" min="1">
        <span class="inline-help">uds</span>
      </div>

      <div class="profit-input-group">
        <label for="currencySelect" class="inline-label">Moneda</label>
        <select id="currencySelect" class="search-input compact-select">
          <option value="USD">USD</option>
          <option value="COP">COP</option>
        </select>
      </div>

      <div class="profit-input-group">
        <label for="trmInput" class="inline-label">TRM</label>
        <input type="number" id="trmInput" class="profit-input wide-input" value="4200">
        <span id="trmStatus" class="status-text is-muted"></span>
      </div>
    </section>

    <div class="dist-tabs" id="distTabs" aria-label="Mayoristas en movil">
      <button type="button" class="dist-tab active" data-dist="LOL">
        <span class="dist-tab-dot dist-tab-dot-lol"></span>
        LOL
      </button>
      <button type="button" class="dist-tab" data-dist="INTCOMEX">
        <span class="dist-tab-dot dist-tab-dot-intcomex"></span>
        INTCOMEX
      </button>
      <button type="button" class="dist-tab" data-dist="INGRAM">
        <span class="dist-tab-dot dist-tab-dot-ingram"></span>
        INGRAM
      </button>
    </div>

    <section id="resultsArea" aria-live="polite">
      <div class="empty-state">
        <div class="icon">&#128269;</div>
        <h3>Busca una licencia</h3>
        <p>Escribe el nombre del producto y presiona Buscar</p>
      </div>
    </section>
  </main>

  <script type="module" src="js/search.js"></script>
</body>
</html>
