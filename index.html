<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LicenseHub - Comparador de Mayoristas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:      '#F2F2F7',
            card:    '#FFFFFF',
            primary: '#1C1C1E',
            muted:   '#8E8E93',
            sep:     '#D1D1D6',
            action:  '#007AFF',
            success: '#34C759',
            danger:  '#FF3B30',
            warn:    '#FF9500',
            lol:     '#FF3B30',
            intcomex:'#FF9500',
            ingram:  '#007AFF',
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          boxShadow: {
            card: '0 4px 20px rgba(0,0,0,0.04)',
            btn:  '0 2px 8px rgba(0,0,0,0.06)',
          },
          borderRadius: {
            card:  '16px',
            btn:   '12px',
            input: '10px',
            chip:  '20px',
          },
        }
      }
    }
  </script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="LicenseHub">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css?v=1773950685">
</head>
<body class="bg-bg text-primary min-h-screen font-sans antialiased" style="letter-spacing:-0.022em">

  <!-- NAV -->
  <nav class="sticky top-0 z-50 flex items-center justify-between px-6 h-[52px]
              bg-white/70 backdrop-blur-sm border-b border-sep/50">
    <div class="flex items-center gap-2 text-[15px] font-semibold tracking-tight">
      <div class="w-2.5 h-2.5 rounded-full bg-action flex-shrink-0"></div>
      LicenseHub
    </div>
    <div id="totalCount"
         class="text-[11px] font-medium text-muted bg-bg px-3 py-1 rounded-chip border border-sep">
      Cargando datos...
    </div>
  </nav>

  <main class="max-w-[960px] mx-auto px-4 pt-5 pb-12">

    <!-- SEARCH CARD -->
    <section class="bg-card rounded-card shadow-card p-5 mb-3" aria-label="Busqueda de licencias">
      <p class="text-[11px] font-semibold text-muted uppercase tracking-[0.06em] mb-3">
        Buscar licencias
      </p>
      <div class="flex flex-wrap gap-2 items-end">
        <div class="flex flex-col gap-1 flex-[2] min-w-[200px]">
          <label for="searchInput" class="text-[11px] font-medium text-muted">Nombre del producto</label>
          <input type="text" id="searchInput" class="search-input"
                 placeholder="Ej: Microsoft 365, Office, Teams...">
        </div>
        <div class="flex flex-col gap-1 flex-1 min-w-[130px]">
          <label for="typeFilter" class="text-[11px] font-medium text-muted">Tipo</label>
          <select id="typeFilter" class="search-input">
            <option value="">Todos los tipos</option>
            <option value="NCE">NCE</option>
            <option value="SUSCRIPCION">Suscripcion</option>
            <option value="PERPETUO">Perpetuo</option>
          </select>
        </div>
        <div class="flex flex-col gap-1 flex-1 min-w-[130px]">
          <label for="segFilter" class="text-[11px] font-medium text-muted">Segmento</label>
          <select id="segFilter" class="search-input">
            <option value="">Todos</option>
            <option value="Commercial">Commercial</option>
            <option value="Education">Education</option>
            <option value="Charity">Charity</option>
          </select>
        </div>
        <div class="flex flex-col gap-1 flex-1 min-w-[130px]">
          <label for="termFilter" class="text-[11px] font-medium text-muted">Periodo</label>
          <select id="termFilter" class="search-input">
            <option value="">Todos</option>
            <option value="mensual">Mensual</option>
            <option value="anual">Anual</option>
            <option value="trianual">Trianual</option>
            <option value="onetime">One Time / Perpetuo</option>
          </select>
        </div>
        <button type="button" id="searchButton"
                class="self-end bg-action text-white font-semibold text-sm rounded-btn
                       px-5 py-[10px] min-h-[40px] whitespace-nowrap shadow-btn
                       hover:opacity-90 hover:-translate-y-px active:translate-y-0
                       transition-all duration-150">
          Buscar
        </button>
      </div>

      <!-- Chips -->
      <div class="flex flex-wrap gap-1.5 mt-3 pt-3 border-t border-sep" aria-label="Mayoristas activos">
        <button type="button" class="filter-chip active" data-dist="LOL">
          <span class="chip-dot chip-dot-lol"></span>LOL
        </button>
        <button type="button" class="filter-chip active" data-dist="INTCOMEX">
          <span class="chip-dot chip-dot-intcomex"></span>INTCOMEX
        </button>
        <button type="button" class="filter-chip active" data-dist="INGRAM">
          <span class="chip-dot chip-dot-ingram"></span>INGRAM
        </button>
      </div>
    </section>

    <!-- QUOTE BAR -->
    <section class="bg-card rounded-card shadow-card px-5 py-3.5 mb-5
                    flex flex-wrap items-center gap-4" aria-label="Configuracion de cotizacion">
      <p class="text-[11px] font-semibold text-muted uppercase tracking-[0.06em] whitespace-nowrap">
        Cotización
      </p>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="profitPct" class="text-[11px] font-medium text-muted whitespace-nowrap">Rentabilidad</label>
        <input type="number" id="profitPct" value="20" min="0" max="999" class="profit-input">
        <span class="text-[12px] font-medium text-muted">%</span>
      </div>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="qtyInput" class="text-[11px] font-medium text-muted whitespace-nowrap">Cantidad</label>
        <input type="number" id="qtyInput" value="1" min="1" class="qty-input">
        <span class="text-[12px] font-medium text-muted">uds</span>
      </div>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="currencySelect" class="text-[11px] font-medium text-muted">Moneda</label>
        <select id="currencySelect" class="search-input compact-select">
          <option value="USD">USD</option>
          <option value="COP">COP</option>
        </select>
      </div>
      <div class="hidden sm:block w-px h-5 bg-sep flex-shrink-0"></div>
      <div class="flex items-center gap-1.5">
        <label for="trmInput" class="text-[11px] font-medium text-muted">TRM</label>
        <input type="number" id="trmInput" value="4200" class="profit-input wide-input">
        <span id="trmStatus" class="status-text is-muted"></span>
      </div>
    </section>

    <!-- MOBILE TABS -->
    <div id="distTabs" class="dist-tabs" aria-label="Mayoristas en movil">
      <button type="button" class="dist-tab active" data-dist="LOL">
        <span class="dist-tab-dot dist-tab-dot-lol"></span>LOL
      </button>
      <button type="button" class="dist-tab" data-dist="INTCOMEX">
        <span class="dist-tab-dot dist-tab-dot-intcomex"></span>INTCOMEX
      </button>
      <button type="button" class="dist-tab" data-dist="INGRAM">
        <span class="dist-tab-dot dist-tab-dot-ingram"></span>INGRAM
      </button>
    </div>

    <!-- RESULTS -->
    <section id="resultsArea" aria-live="polite">
      <div class="empty-state">
        <div class="icon">&#128269;</div>
        <h3>Busca una licencia</h3>
        <p>Escribe el nombre del producto y presiona Buscar</p>
      </div>
    </section>

  </main>

  <script type="module" src="js/search.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/licensehub/sw.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.warn('SW error:', err));
      });
    }
  </script>
</body>
</html>
